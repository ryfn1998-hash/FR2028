<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FR｜AI 全解析監控系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    
    <style>
        :root { --neon-green: #00ff41; --glass: rgba(0, 255, 65, 0.1); }
        body { margin: 0; background: #000; color: var(--neon-green); font-family: monospace; overflow: hidden; }

        /* 頂部數據列：呈現駭客矩陣感 */
        .monitor-header {
            display: flex; justify-content: space-around; padding: 10px;
            background: rgba(0,0,0,0.8); border-bottom: 1px solid var(--neon-green);
            font-size: 12px; letter-spacing: 1px;
        }

        /* 鏡頭容器 */
        .viewport { position: relative; width: 100vw; height: calc(100vh - 100px); background: #050505; }
        #webcam { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.6; filter: grayscale(100%) contrast(150%); }
        #overlay { position: absolute; width: 100%; height: 100%; object-fit: cover; }

        /* 右側即時清單 */
        .detection-list {
            position: absolute; top: 20px; left: 20px; background: var(--glass);
            padding: 15px; border-left: 3px solid var(--neon-green); pointer-events: none;
        }

        /* 底部控制列 */
        .footer { height: 60px; display: flex; align-items: center; justify-content: center; background: #000; }
        .btn-scan {
            background: transparent; border: 1px solid var(--neon-green); color: var(--neon-green);
            padding: 8px 30px; cursor: pointer; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="monitor-header">
        <div>SYSTEM: FR_OS_V2.0</div>
        <div>STATUS: SCANNING...</div>
        <div>DB_CONN: ACTIVE</div>
    </div>

    <div class="viewport">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
        
        <div class="detection-list">
            <div style="font-weight: bold; margin-bottom: 10px;">[ 即時偵測清單 ]</div>
            <div id="log-list">正在初始化 AI 模組...</div>
        </div>
    </div>

    <div class="footer">
        <button class="btn-scan" id="startBtn">啟動萬物偵測</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // 沿用 CEO 之前的 Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyDUwqS9JFHgfEeW2Yk2gDE3evco4hUNsdM",
            authDomain: "fr-67-speed-df7c9.firebaseapp.com",
            projectId: "fr-67-speed-df7c9",
            databaseURL: "https://fr-67-speed-df7c9-default-rtdb.asia-southeast1.firebasedatabase.app",
            appId: "1:634537813920:web:bc10e38101935e395066c5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const video = document.getElementById('webcam');
        const canvas = document.getElementById('overlay');
        const ctx = canvas.getContext('2d');
        let model;

        // 啟動相機
        async function setupCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            return new Promise((resolve) => {
                video.onloadedmetadata = () => resolve(video);
            });
        }

        // 萬物偵測核心
        async function detectFrame() {
            const predictions = await model.detect(video);
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            let stats = {};
            
            predictions.forEach(p => {
                // 1. 畫出高科技偵測框 (透視線條感)
                ctx.strokeStyle = "#00ff41";
                ctx.lineWidth = 2;
                ctx.strokeRect(p.bbox[0], p.bbox[1], p.bbox[2], p.bbox[3]);
                
                // 2. 畫出標籤背景
                ctx.fillStyle = "rgba(0, 255, 65, 0.5)";
                ctx.fillRect(p.bbox[0], p.bbox[1] - 20, p.bbox[2], 20);
                
                // 3. 寫上物體名稱與機率
                ctx.fillStyle = "#000";
                ctx.font = "14px monospace";
                ctx.fillText(`${p.class.toUpperCase()} [${Math.round(p.score * 100)}%]`, p.bbox[0] + 5, p.bbox[1] - 5);
                
                // 統計數量
                stats[p.class] = (stats[p.class] || 0) + 1;
            });

            updateUIAndDB(stats);
            requestAnimationFrame(detectFrame);
        }

        function updateUIAndDB(stats) {
            let html = "";
            for (let obj in stats) {
                html += `> ${obj}: ${stats[obj]}<br>`;
            }
            document.getElementById('log-list').innerHTML = html || "> 掃描中...無目標";
            
            // 每秒鐘同步一次資料庫 (避免過載)
            if (Date.now() % 100 < 20) {
                db.ref('live_detection').set({
                    objects: stats,
                    last_update: Date.now()
                });
            }
        }

        document.getElementById('startBtn').onclick = async () => {
            document.getElementById('startBtn').innerText = "模型加載中...";
            model = await cocoSsd.load();
            await setupCamera();
            document.getElementById('startBtn').innerText = "掃描中...";
            detectFrame();
        };
    </script>
</body>
</html>
