<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>67 Speed - FR Technology</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    
    <style>
        :root { --bg: #0a0a0a; --text: #ffffff; --accent: #00d4ff; --gray: #888888; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

        /* 頂部導覽列：仿原版簡約風格 */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 25px; border-bottom: 1px solid #222;
        }
        .brand { font-size: 1.1rem; font-weight: 600; letter-spacing: 1px; }
        .menu-dots { font-size: 1.5rem; color: var(--gray); cursor: pointer; }

        /* 主畫面佈局 */
        main { display: flex; flex-direction: column; align-items: center; padding: 20px; height: calc(100vh - 60px); }

        /* 數據看板：乾淨的格線 */
        .dashboard {
            width: 100%; max-width: 500px; display: grid; grid-template-columns: 1fr 1fr;
            gap: 15px; margin-bottom: 25px;
        }
        .stat-card { background: #151515; padding: 15px; border-radius: 12px; border: 1px solid #222; }
        .stat-label { font-size: 0.75rem; color: var(--gray); text-transform: uppercase; margin-bottom: 5px; }
        .stat-value { font-size: 1.1rem; font-weight: 500; }

        /* 視覺顯示區：修復比例，去掉邊框感 */
        .vision-wrapper {
            position: relative; width: 100%; flex-grow: 1; display: flex; 
            justify-content: center; align-items: center; background: #000;
            border-radius: 20px; overflow: hidden;
        }
        #webcam { display: none; }
        #output_canvas { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        /* 懸浮分數：原版風格大字 */
        .floating-score {
            position: absolute; top: 20px; right: 25px; text-align: right; pointer-events: none;
        }
        .score-num { font-size: 4.5rem; font-weight: 700; color: var(--accent); line-height: 1; }
        .score-unit { font-size: 0.8rem; color: var(--accent); opacity: 0.7; }

        /* 底部按鈕：全寬度、圓角、純色 */
        .control-panel { width: 100%; max-width: 500px; padding: 20px 0; }
        .btn-action {
            width: 100%; background: #fff; color: #000; border: none;
            padding: 18px; font-size: 1rem; font-weight: 600; border-radius: 100px;
            cursor: pointer; transition: opacity 0.2s;
        }
        .btn-action:active { opacity: 0.8; }
        .btn-action:disabled { background: #333; color: #666; }
    </style>
</head>
<body>

    <nav>
        <div class="brand">FR-67-Speed</div>
        <div class="menu-dots">⋮</div>
    </nav>

    <main>
        <div class="dashboard">
            <div class="stat-card">
                <div class="stat-label">Global Total</div>
                <div class="stat-value" id="globalTotal">Connecting...</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">World Best</div>
                <div class="stat-value" id="globalBest">---</div>
            </div>
        </div>

        <div class="vision-wrapper">
            <video id="webcam" playsinline></video>
            <canvas id="output_canvas"></canvas>
            
            <div class="floating-score">
                <div class="score-num" id="score">00</div>
                <div class="score-unit">SWINGS</div>
            </div>
        </div>

        <div class="control-panel">
            <button class="btn-action" id="startBtn">START CHALLENGE</button>
            <p id="timer" style="text-align: center; margin-top: 15px; font-size: 0.9rem; color: var(--gray);">READY</p>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // 沿用 CEO 提供的 Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyDUwqS9JFHgfEeW2Yk2gDE3evco4hUNsdM",
            authDomain: "fr-67-speed-df7c9.firebaseapp.com",
            projectId: "fr-67-speed-df7c9",
            databaseURL: "https://fr-67-speed-df7c9-default-rtdb.asia-southeast1.firebasedatabase.app",
            appId: "1:634537813920:web:bc10e38101935e395066c5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('stats').on('value', (s) => {
            const data = s.val() || { total: 0, best: 0 };
            document.getElementById('globalTotal').innerText = data.total.toLocaleString();
            document.getElementById('globalBest').innerText = data.best;
            window.cloud = data;
        });

        const video = document.getElementById('webcam');
        const canvas = document.getElementById('output_canvas');
        const ctx = canvas.getContext('2d');
        let count = 0, isRunning = false, lastY = { Left: 0, Right: 0 };

        const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
        hands.setOptions({ maxNumHands: 2, modelComplexity: 0, minDetectionConfidence: 0.5 });

        hands.onResults((results) => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.save();
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.drawImage(results.image, 0,0,canvas.width,canvas.height);

            if (results.multiHandLandmarks) {
                results.multiHandLandmarks.forEach((marks, idx) => {
                    const side = results.multiHandedness[idx].label;
                    const y = marks[8].y;
                    if (isRunning && Math.abs(y - lastY[side]) > 0.12) {
                        count++;
                        document.getElementById('score').innerText = count.toString().padStart(2, '0');
                    }
                    lastY[side] = y;
                    // 僅畫出極細白線骨架，符合極簡風
                    drawConnectors(ctx, marks, HAND_CONNECTIONS, {color: '#ffffff', lineWidth: 1.5});
                });
            }
            ctx.restore();
        });

        const camera = new Camera(video, { 
            onFrame: async () => { await hands.send({image: video}); },
            width: 480, height: 640 
        });
        camera.start();

        document.getElementById('startBtn').onclick = () => {
            isRunning = true; count = 0;
            document.getElementById('score').innerText = "00";
            document.getElementById('startBtn').disabled = true;
            document.getElementById('startBtn').innerText = "TRACKING...";
            
            let time = 20;
            const timer = setInterval(() => {
                time--;
                document.getElementById('timer').innerText = `TIME REMAINING: ${time}s`;
                if (time <= 0) {
                    clearInterval(timer);
                    isRunning = false;
                    document.getElementById('startBtn').disabled = false;
                    document.getElementById('startBtn').innerText = "RESTART";
                    document.getElementById('timer').innerText = "CHALLENGE ENDED";
                    upload(count);
                }
            }, 1000);
        };

        function upload(score) {
            const total = (window.cloud.total || 0) + score;
            const best = Math.max(window.cloud.best || 0, score);
            db.ref('stats').set({ total, best });
        }
    </script>
</body>
</html>
